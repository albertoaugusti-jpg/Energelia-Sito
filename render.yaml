services:
  - type: web
    name: energelia
    runtime: python
    plan: starter
    region: frankfurt
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 main2:app
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: DATABASE_URL
        fromDatabase:
          name: energelia-db
          property: connectionString
      - key: ADMIN_PASSWORD
        sync: false

databases:
  - name: energelia-db
    plan: free
    region: frankfurt
    postgresMajorVersion: 16
