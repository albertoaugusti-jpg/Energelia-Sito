  <!DOCTYPE html>
  <html lang="it">
  <head>
  <!-- Google Analytics -->

  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Ultrarem · Virgilio</title>
  <style>
    :root{
      --bg:#0b0c10;--ink:#e8eaf1;--muted:#a6acc3;--divider:rgba(255,255,255,.08);
      --ease:cubic-bezier(.2,.8,.2,1);--blur:8px;--cta-bg:rgba(255,230,210,.92);
      --cta-ink:#1a0b0b;--cta-dot:#ff6a3d;--brand-dot:#ffad7f
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;color:var(--ink);
      font:16px/1.55 system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial;
      background:
        radial-gradient(1100px 820px at 85% -10%, #241714 0%, transparent 60%),
        radial-gradient(980px 980px at -10% 110%, #160d0c 0%, transparent 55%),
        var(--bg);
      overflow:hidden; /* scorre solo la chat, lo sfondo resta fermo */
    }

    .app{height:100%;display:flex;flex-direction:column;position:relative}
    .header{
      height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;
      border-bottom:1px solid var(--divider);
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,0));
      backdrop-filter:saturate(130%) blur(4px)
    }
    .brand{display:flex;align-items:center;gap:10px;font-weight:600}
    .dot{width:10px;height:10px;border-radius:50%;background:var(--brand-dot);box-shadow:0 0 10px var(--brand-dot)}

    .chat{flex:1;display:flex;flex-direction:column;max-width:1100px;width:100%;margin:0 auto}

    /* Area messaggi con scrollbar */
    .messages{
      flex:1;
      overflow-y:auto; /* scrollbar verticale */
      overscroll-behavior:contain;
      -webkit-overflow-scrolling:touch;
      padding:20px;
      background:var(--bg);
      scroll-behavior:smooth;
    }
    /* Scrollbar WebKit/Blink */
    .messages::-webkit-scrollbar{width:12px}
    .messages::-webkit-scrollbar-track{background:rgba(255,255,255,.04);border-left:1px solid var(--divider)}
    .messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,.22);border-radius:10px}
    .messages::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.34)}
    /* Scrollbar Firefox */
    .messages{scrollbar-color: rgba(255,255,255,.34) rgba(255,255,255,.06);scrollbar-width:thin}

    /* Banner di benvenuto NON sticky (sparisce dopo il primo invio) */
    .welcome{
      margin:0 0 12px 0;
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid var(--divider);
      border-radius:12px;
      padding:14px 16px;
      backdrop-filter:saturate(140%) blur(2px);
    }
    .welcome h2{margin:0 0 6px 0;font-size:1rem}
    .welcome p{margin:0;color:var(--muted);font-size:.9rem}
    .welcome .tips{margin-top:8px;font-size:.9rem}

    #list{display:flex;flex-direction:column;gap:14px}

    .row{display:flex;align-items:flex-end;gap:12px;animation:fadeUp .25s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .row.me{justify-content:flex-end}.row.dead{align-items:flex-start}
    .avatar{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;flex:0 0 auto;color:#fff;font-weight:650;font-size:.8rem;box-shadow:0 4px 12px rgba(0,0,0,.38)}
    .avatar.user{background:linear-gradient(180deg,#4b5266,#2a2f3e)}
    .avatar.me{background:linear-gradient(180deg,#d44a2a,#9b1c10)}
    .avatar.dead{background:linear-gradient(180deg,#0d0e12,#191a21);border:1px solid var(--divider)}
    .bubble{max-width:min(70ch,80%);padding:12px 14px;border-radius:14px;box-shadow:0 10px 26px rgba(0,0,0,.3);backdrop-filter:saturate(140%) blur(2px)}
    .user .bubble{background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.08)}
    .me .bubble{background:linear-gradient(180deg,rgba(212,74,42,.20),rgba(212,74,42,.10));border:1px solid rgba(255,160,130,.22)}
    .dead .bubble{background:linear-gradient(180deg,rgba(18,18,24,.9),rgba(28,28,34,.9));border:1px solid rgba(255,255,255,.06);font-style:italic}
    .meta{margin-top:6px;font-size:.75rem;color:var(--muted)}

    .composer{
      padding:14px 20px;border-top:1px solid var(--divider);
      background:var(--bg);
      position:sticky;bottom:0
    }
    .compose{display:flex;gap:10px}
    .input-chat{
      flex:1;background:transparent;border:1px solid rgba(255,255,255,.12);
      border-radius:10px;color:var(--ink);padding:.8rem .9rem
    }
    .send{
      height:40px;padding:0 14px;border-radius:10px;border:1px solid rgba(255,255,255,.45);
      background:var(--cta-bg);color:var(--cta-ink);font-weight:700;cursor:pointer
    }

    .obscured .chat{filter:blur(var(--blur)) saturate(90%) brightness(.7);transition:filter .35s var(--ease)}
    .veil{position:fixed;inset:0;background:radial-gradient(80% 80% at 50% 40%, rgba(12,4,2,.78), rgba(12,4,2,.92));opacity:0;pointer-events:none;transition:opacity .35s var(--ease);z-index:3}
    .veil.show{opacity:1;pointer-events:auto}
    .oracle{position:fixed;inset:0;display:grid;place-items:center;z-index:4;pointer-events:none;opacity:0;transform:translateY(8px);transition:opacity .45s var(--ease),transform .45s var(--ease)}
    .oracle.show{opacity:1;transform:translateY(0);pointer-events:auto}
    .oracle-wrap{display:flex;flex-direction:column;align-items:center;gap:18px}
    .oracle-line{font-family:Georgia,serif;font-weight:500;letter-spacing:.15px;font-size:clamp(1.05rem,2.1vw,1.35rem);text-align:center;color:#fff4ef;max-width:60ch;text-shadow:0 2px 22px rgba(0,0,0,.45)}
    .cta-row{display:flex;gap:.6rem;justify-content:center}
    .cta-go{display:inline-flex;align-items:center;gap:.6rem;padding:.7rem 1.2rem;border-radius:999px;border:1px solid rgba(255,255,255,.45);background:var(--cta-bg);color:var(--cta-ink);font-weight:700;box-shadow:0 10px 26px rgba(0,0,0,.25);cursor:pointer}
    .cta-go .dot{width:8px;height:8px;border-radius:50%;background:var(--cta-dot);box-shadow:0 0 10px var(--cta-dot)}

    .orb{width:120px;height:120px;border-radius:50%;background:conic-gradient(from 0deg,#ff6a3d,#ffad7f,#ff6a3d);box-shadow:0 0 35px rgba(255,106,61,.8),0 0 60px rgba(255,173,127,.5);animation:spinOrb 5s linear infinite, pulseOrb 2.5s ease-in-out infinite}
    @keyframes spinOrb{to{transform:rotate(360deg)}}
    @keyframes pulseOrb{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
    .thinking-text{font-size:1rem;color:#ffeadf;font-style:italic;animation:fadeBlink 1.8s ease-in-out infinite}
    @keyframes fadeBlink{0%,100%{opacity:.3}50%{opacity:1}}
    .typing{display:flex;gap:5px}
    .dotSmall{width:6px;height:6px;border-radius:50%;background:#aaa;animation:typingBlink 1.4s infinite ease-in-out}
    .dotSmall:nth-child(2){animation-delay:.2s}
    .dotSmall:nth-child(3){animation-delay:.4s}
    @keyframes typingBlink{0%,80%,100%{opacity:.3;transform:scale(.9)}40%{opacity:1;transform:scale(1.3)}}

    /* Spacer e ancora per autoscroll condizionato */
    #bottom-spacer{height:80px}
    #bottom-anchor{width:1px;height:1px}
  </style>
  </head>
  <body>
    <div id="app" class="app">
      <header class="header">
        <div class="brand"><span class="dot"></span><span>Ultrarem · Virgilio</span></div>
      </header>

      <main class="chat">
        <section id="messages" class="messages" aria-live="polite">
          <!-- Banner di benvenuto: verrà rimosso dopo il primo messaggio -->
          <div class="welcome" id="welcome">
            <h2>Benvenuto in Ultrarem · Virgilio</h2>
            <p>Scrivi qui sotto per iniziare. Clicca <strong>VAI</strong> per sentire Virgilio e poi il Morto. La chat scorre solo qui, lo sfondo resta fermo.</p>
            <div class="tips">Tips: <strong>Invio</strong> invia · <strong>Shift+Invio</strong> va a capo.</div>
          </div>

          <div id="list"></div>
          <div id="bottom-spacer" aria-hidden="true"></div>
          <div id="bottom-anchor" aria-hidden="true"></div>
        </section>

        <section class="composer" id="composer">
          <div class="compose">
            <input id="inputChat" class="input-chat" type="text" placeholder="Scrivi… (Invio per inviare)" autocomplete="off"/>
            <button id="btnSend" class="send">Invia</button>
          </div>
        </section>
      </main>
    </div>

    <div id="veil" class="veil"></div>
    <aside id="oracle" class="oracle" aria-live="assertive" aria-label="Virgilio">
      <div class="oracle-wrap">
        <div class="orb"></div>
        <div id="oracleThinking" class="thinking-text">Virgilio sta pensando…</div>
        <div id="oracleLine" class="oracle-line"></div>
        <div class="cta-row"><button id="btnGo" class="cta-go"><span class="dot"></span>VAI</button></div>
      </div>
    </aside>

    <script>
    // Prompt sviluppatore (passato al backend)
    const MY_DEV_PROMPT = `Stiamo facendo un roleplay in cui io sono il figlio di Zeno Cosini...`;

    // Riferimenti DOM
    const appEl=document.getElementById('app');
    const messages=document.getElementById('messages');
    const list=document.getElementById('list');
    const spacer=document.getElementById('bottom-spacer');
    const bottomAnchor=document.getElementById('bottom-anchor');
    const composer=document.getElementById('composer');
    const inputChat=document.getElementById('inputChat');
    const btnSend=document.getElementById('btnSend');
    const welcome=document.getElementById('welcome');

    const veil=document.getElementById('veil'), oracle=document.getElementById('oracle'),
          oracleLine=document.getElementById('oracleLine'), btnGo=document.getElementById('btnGo'),
          oracleThinking=document.getElementById('oracleThinking');

    let LAST_PROMPT='', COVERED=false, SUGGESTED_Q='';
    let atBottom = true;
    let welcomeRemoved = false;

    // Spacer dinamico = altezza composer + 24px
    const ro = new ResizeObserver(()=> {
      const h = composer.getBoundingClientRect().height;
      spacer.style.height = (h + 24) + 'px';
    });
    ro.observe(composer);

    // Autoscroll condizionato
    const io = new IntersectionObserver((entries)=> {
      atBottom = entries.some(e => e.isIntersecting);
    }, { root: messages, threshold: 1 });
    io.observe(bottomAnchor);

    const now=()=>new Intl.DateTimeFormat('it-IT',{hour:'2-digit',minute:'2-digit'}).format(new Date());
    function makeRow(side,text,typing=false){
      const row=document.createElement('div'); row.className=`row ${side}`;
      const avClass=side==='me'?'me':side==='dead'?'dead':'user', avText=side==='me'?'ME':side==='dead'?'M':'IO';
      const bubble = typing
        ? '<span class="typing"><span class="dotSmall"></span><span class="dotSmall"></span><span class="dotSmall"></span></span>'
        : text;
      row.innerHTML=`<div class="avatar ${avClass}">${avText}</div><div><div class="bubble">${bubble}</div><div class="meta">${now()}</div></div>`;
      return row;
    }
    function appendMessage(side,text,typing=false){
      const row = makeRow(side,text,typing);
      list.appendChild(row);
      if (atBottom) bottomAnchor.scrollIntoView({block:'end'});
      return row;
    }

    function obscure(on){ if(on){ veil.classList.add('show'); appEl.classList.add('obscured'); } else { veil.classList.remove('show'); appEl.classList.remove('obscured'); } }
    function hideOracle(){ oracle.classList.remove('show'); obscure(false); oracleLine.textContent=''; btnGo.disabled=true; oracleThinking.style.display='none'; }

    // --- Flusso "Morto"
    async function askDead(question, { preHidden = false } = {}){
      if(!preHidden) hideOracle();
      const typingRow = appendMessage('dead','',true);
      try{
        const r = await fetch('/ask', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ message: LAST_PROMPT, question, dev_prompt: MY_DEV_PROMPT })
        });
        const data = await r.json();
        const morto = (data.morto || '').toString().trim();
        setTimeout(()=>{
          typingRow.remove();
          appendMessage('dead', morto || 'Il Morto tace, ma non per sempre.');
          btnSend.disabled=false; inputChat.focus();
        }, 450);
      }catch(e){
        typingRow.remove();
        appendMessage('dead','⚠️ Errore di rete.');
        btnSend.disabled=false;
      }
    }

    // Pulsante VAI → chiude Virgilio e passa al Morto
    btnGo.onclick = ()=>{
      btnGo.disabled=true;
      const q = COVERED ? LAST_PROMPT : (SUGGESTED_Q || LAST_PROMPT);
      hideOracle();
      askDead(q, { preHidden: true });
    };

    // Invio domanda (apre SSE per Virgilio)
    async function invoke(prompt){
      // al primo invio rimuovi il banner di benvenuto
      if (!welcomeRemoved && welcome) {
        welcomeRemoved = true;
        welcome.remove();
      }

      LAST_PROMPT = prompt; COVERED=false; SUGGESTED_Q='';
      appendMessage('me', prompt);
      btnSend.disabled=true;

      obscure(true); oracle.classList.add('show');
      oracleLine.textContent=''; btnGo.disabled=true; oracleThinking.style.display='block';

      if (window.EventSource){
        try{
          const es = new EventSource(`/ask_sse?message=${encodeURIComponent(prompt)}&dev_prompt=${encodeURIComponent(MY_DEV_PROMPT)}`);
          es.addEventListener("virgilio", ev=>{ oracleLine.textContent += ev.data; });
          es.addEventListener("virgilio_done", ()=>{ btnGo.disabled=false; });
          es.addEventListener("suggestion", ev=>{ try{ SUGGESTED_Q = JSON.parse(ev.data||"{}").suggested_question || ""; }catch(_){ SUGGESTED_Q=''; } });
          es.addEventListener("done", ev=>{ try{ COVERED = !!JSON.parse(ev.data||"{}").covered; }catch(_){ COVERED=false; } es.close(); oracleThinking.style.display="none"; });
          es.addEventListener("error", ()=>{ es.close(); fallbackPost(prompt); });
          return;
        }catch(_){}
      }
      fallbackPost(prompt);
    }

    async function fallbackPost(prompt){
      try{
        const r = await fetch('/ask', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ message: prompt, dev_prompt: MY_DEV_PROMPT })
        });
        const data = await r.json();
        oracleLine.textContent = (data.virgilio || '').toString();
        SUGGESTED_Q = (data.suggested_question || '');
        COVERED = !!data.covered;
        btnGo.disabled=false; oracleThinking.style.display="none";
      }catch(e){
        hideOracle(); appendMessage('dead','⚠️ Errore di rete.'); btnSend.disabled=false;
      }
    }

    // UI handlers
    btnSend.addEventListener('click', ()=>{
      const txt=inputChat.value.trim(); if(!txt) return;
      inputChat.value=''; invoke(txt);
    });
    inputChat.addEventListener('keydown', e=>{
      if(e.key==='Enter' && !e.shiftKey){
        e.preventDefault();
        const txt=inputChat.value.trim(); if(!txt) return;
        inputChat.value=''; invoke(txt);
      }
    });

    // Rotellina sempre sulla chat anche se il mouse non è sopra
    window.addEventListener('wheel', (e)=>{
      if (!messages.contains(e.target)) {
        e.preventDefault();
        messages.scrollTop += e.deltaY;
      }
    }, {passive:false});

    // Touch swipe fuori dalla chat → scrolla la chat (mobile)
    let touchStartY=null;
    window.addEventListener('touchstart', (e)=>{
      if (!messages.contains(e.target)) touchStartY = e.touches[0].clientY;
    }, {passive:true});
    window.addEventListener('touchmove', (e)=>{
      if (touchStartY!==null && !messages.contains(e.target)) {
        const dy = touchStartY - e.touches[0].clientY;
        messages.scrollTop += dy;
        touchStartY = e.touches[0].clientY;
        e.preventDefault();
      }
    }, {passive:false});
    window.addEventListener('touchend', ()=>{ touchStartY=null; }, {passive:true});

    // Focus iniziale + primo messaggio di sistema nella timeline
    window.addEventListener('DOMContentLoaded', ()=>{
      inputChat.focus();
      appendMessage('dead', 'Inizia a scrivere qui sotto. Premi VAI quando vuoi passare dal pensiero di Virgilio alla voce del Morto.');
    });
    </script>
  </body>
  </html>
