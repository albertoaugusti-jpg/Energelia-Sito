<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a5276"/>
      <stop offset="1" stop-color="#0a1530"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4d03f" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#f4d03f" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Sfondo arrotondato blu navy -->
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>

  <!-- Fascio luminoso sinistro -->
  <polygon points="32,18 6,42 14,42" fill="url(#beam)"/>
  <!-- Fascio luminoso destro -->
  <polygon points="32,18 58,42 50,42" fill="url(#beam)"/>

  <!-- Base/scoglio -->
  <path d="M8 52 Q 18 48 32 50 T 56 52 V60 H8 Z" fill="#0a1530"/>
  <path d="M6 56 Q 18 54 32 56 T 60 56 V60 H6 Z" fill="#1a5276" opacity="0.55"/>

  <!-- Corpo del faro (bianco con strisce oro) -->
  <polygon points="27,42 37,42 35,22 29,22" fill="#ffffff"/>
  <rect x="27" y="26" width="10" height="2.2" fill="#d4af37"/>
  <rect x="27" y="32" width="10" height="2.2" fill="#d4af37"/>
  <rect x="27" y="38" width="10" height="2.2" fill="#d4af37"/>

  <!-- Lanterna -->
  <rect x="28.5" y="16" width="7" height="6" fill="#d4af37"/>
  <!-- Vetro luminoso -->
  <circle cx="32" cy="17.5" r="2" fill="#fffbe0"/>
  <!-- Cupola -->
  <path d="M28 16 Q32 8 36 16 Z" fill="#0a1530"/>
  <!-- Asta -->
  <rect x="31.4" y="6" width="1.2" height="3" fill="#d4af37"/>

  <!-- Base larga del faro -->
  <rect x="25" y="42" width="14" height="3.5" fill="#f4d03f"/>
</svg>
